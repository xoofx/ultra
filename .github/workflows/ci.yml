name: ci

on:
  push:
    paths-ignore:
    - 'doc/**'
    - 'img/**'
    - '*.md'
    - '*.txt'
  pull_request:

jobs:
  build:
    runs-on: 'windows-latest'
    steps:
      - name: "Build, Test, Pack and Publish"
        uses: xoofx/.github/.github/actions/dotnet-releaser-action@main

  build-macos:
    runs-on: 'macos-15' # ARM64 (Apple Silicon)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
           8.0.x
           10.0.x

      - name: Build native sampler
        working-directory: src/Ultra.Sampler
        run: ./build_native.sh

      - name: Build
        run: dotnet build ./src/ultra.slnx -c Release

      - name: Test
        run: dotnet test ./src/ultra.slnx -c Release --no-build

      - name: Smoke test profiling
        working-directory: src
        run: |
          ./Ultra/bin/Release/net8.0/ultra profile --duration 10 -- Ultra.Example/bin/Release/net8.0/Ultra.Example
          ls -la *.json.gz